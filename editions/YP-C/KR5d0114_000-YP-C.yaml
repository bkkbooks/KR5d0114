front:
  text: 還源篇序泰素慕眞宗遍遊勝境參傳正法願以濟世爲心專一存三尤以養生爲重蓋謂學仙甚易而人自難脫塵不難而人未易深可哀哉古云迷雲鎖慧月業風吹定海昔年於驛中遇先師紫陽張眞人以簡易之語不過半句其證驗之效只在片時知仙之可學私自生歡喜及其金液交結聖胎圓成泰故作還源篇八十一章五言四句以授晚學早悟眞詮莫待老來鉛虛汞少急須猛省尋師訪道修鍊金丹同證仙階變化飛昇實所願望焉杏林石泰得之序重刊道藏輯要還源篇紫虛眞人石得之著
  hash: sha256:3b0ec97add4d0229292fa94b0e04df3bad5be4effd3736721912c1b850795eee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0114_YP-C_15kuiji-04-0001a, image: JY181/15kuiji-04-0001a.png}
body:
  text: 五言絕句鉛汞成眞體陰陽結太元但知行二八便可煉金丹汞是青龍體鉛爲白虎脂掇來歸鼎內採取要知時姹女騎鉛虎金翁跨汞龍甲庚明正令煉取一爐紅蛇魄擒龍髓龜魂制虎精華池神水內一朶玉脂生白雪飛瓊苑黃芽發玉園但能知偃月何處煉紅鉛藥材開混沌火候煉洪濛十月胎仙化方知九轉功龍正藏珠處雞方抱卵時誰知鉛汞合正可飲刀圭沐浴資坤水吹噓賴巽風嬰兒無一事獨處太微宫紫府尋離女朱陵配坎男黃婆媒合處太極自函三乾馬馳金戸坤牛入木宫阿誰將姹女嫁去與金翁姹女方二八金翁正九三洞房生瑞氣歡合產初男昨夜西川岸蟾光照碧濤採來歸玉室鼎內自煎熬離坎非交姤乾坤自化生人能明此理一點落黃庭丹谷生神水黃庭有太倉更無飢渴想一直入仙郷意馬歸神室心猿守洞房精神魂魄意化作紫金霜一孔元關窮三關要路頭忽然輕運動神水自然流制魄非心制拘魂豈意拘惟留神與氣片餉結玄珠口訣無多子修丹在片時温温行火候十月產嬰兒夫婦初歡合年深意轉濃洞房交會處無日不春風驟雨紙蝴蝶金爐玉牡丹三更紅日赫六月素霜寒海底飛金火山巔運土泉片時交媾就玉鼎起青烟鑿破玄元竅衝開混沌關但知烹水火一任虎龍蟠娑竭水中火崑崙山上波誰能知運用大意要黃婆藥用先天氣火尋太易精能知藥取火定裏見丹成元氣如何服眞精不用移眞精與元氣此是大丹基儒家明性理釋氏打頑空不識神仙術金丹頃刻功偃月爐中汞朱砂鼎裏鉛龜蛇眞一氣所產在先天朔望尋弦晦抽添象缺圓不知眞造化何物是眞鉛氣是形中命心爲性內神能知神氣穴即是得仙人木髓烹金鼎泉流注玉爐誰將三百日慢慢著工夫玉鼎烹鉛液金爐養汞精九還爲九轉温養象周星玉液滋神室金胎結氣樞只尋身內藥不用檢丹書火棗元無核交梨豈有查終朝行火候神水灌金花煉氣徒施力存神枉用工豈知丹訣妙鎭日翫眞空欲煉先天氣先乾活水銀聖胎如結見破頂見雷鳴氣產非干腎神居不在心氣神難捉摸化作一團金一竅名玄牝中藏氣與神有誰知此竅更莫外尋眞脾胃非神室膀胱迺腎餘勸君休執泥此不是丹樞內景詩千首中黃酒一尊逍遙無物累身外有乾坤烏兔相煎煮龜蛇自繞纏化成丹一粒温養作胎仙萬物皆生死元神死復生以神歸氣內丹道自然成神氣歸根處身心復命時這般眞孔竅料得少人知身裏有玄牝心中無垢塵不知誰解識一竅內涵眞離坎眞龍虎乾坤正馬牛人人皆具足因甚不知修魂魄爲心主精神以意包如如行火候默默運初爻心下腎上處肝西肺左中非腸非胃腑一氣自流通妙用非關意眞機不用時誰能知此竅且莫任無爲有物非無物無爲合有爲化權歸手內烏兔結金脂虎嘯西山上龍吟北海東捉來須野戰寄在艮坤宫復垢司明晦屯蒙直曉昏丹爐凝白雪無處覓猿心黑汞生黃葉紅鉛綻紫花更須行火候鼎裏結丹砂木液須妨兔金精更忌雞抽添須沐浴正是月團時萬籟風初起千山月乍圓急須行正令便可運周天藥材分老嫩火候用抽添一粒丹光起寒蟾射玉簷蚌腹珠曾剖雞窠卵易尋無中生有物神氣自相侵神氣非子母身心豈夫婦但要合天機誰識結丹處丹頭初結處藥物已凝時龍虎交相戰東君總不知旁門并小法異術及閑言金液還丹訣渾無第二門貴賤并高下夫妻與弟兄修仙如有分皆可看丹經屋破修容易藥枯生不難但知歸復法金寶積如山魂魄成三性精神會五行就中分四象攢簇結胎精定志求鉛汞灰心覓土金方知眞一竅誰測此幽深造化無根蒂陰陽有本源這些眞妙處父子不相傳留汞居金鼎將鉛入玉池主賓無左右只要識嬰兒黃婆雙乳美丁老片心慈温養無他術無中養就兒絳闕翔青鳳丹田養玉蟾壺中天不夜白雪落纖纖琴瑟合諧後箕裘了當時不須行火候又恐損嬰兒長男纔入兌少女便歸乾巽宫并土位關鎖自周天弦後弦前處月圓月缺時抽添象刑德沐浴按盈虧老汞三斤白眞鉛一點紅奪他天地髓交媾片時中火候通玄處古今誰肯傳未曾知採藥且莫問周天雲散海棠月春深楊柳風阿誰知此意舉目問虛空人間無物累天上有仙階已解乘雲了相將白鶴來心田無草穢性此絕塵飛夜靜月明處一聲春鳥啼白金烹六卦黑錫過三關半夜三更裏金烏入廣寒丹熟無龍虎火中休汞鉛脫胎已神化更作玉清仙塞斷黃泉路衝開紫府門如何海蟾子化鶴出泥丸江海歸何處山巖屬甚人金丹成熟後總是屋中珍呂承鍾口訣葛授鄭心傳總沒閑言語都來只汞鉛汞鉛歸一鼎日月要同爐進火須防忌教君結玉酥採藥再交結進火與沐浴及至脫胎時九九陽數足後序夫煉金丹之士須知冬至不在子時沐浴亦非卯酉汞鉛二物皆非唾㖒精津氣血液也七返者返本九還者還源金精木液遇土則交龍虎馬牛總皆無相先師悟眞篇所謂金丹之要在于神水華池者卽鉛汞也人能知鉛之出處則知汞之所產旣知鉛與汞則知神水華池旣知神水華池則可以煉金丹金丹之功成於片時不可執九載三年之日程不可泥年月日時而運用錘離所謂四大一身皆屬陰也如是則不可就身中而求特可尋身中一點陽精可也然此陽精在乎一竅常人不可得而猜度也只此一竅則是玄北之門正所謂神水華池也知此則可以採取然後交結其次烹煉至於沐浴以及分胎更須温養丹成可不辯川源知斤兩識時日者耶泰自從得師訣以來知此身不可死知此丹必可成今旣大事入手以此詔諸未來學仙者云
