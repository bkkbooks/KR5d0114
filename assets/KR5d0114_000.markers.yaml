  - {type: variant, offset: 1822, length: 0, content: '', CK-KZ: 所謂金丹之要在于神水華池者卽鉛汞也人能知鉛之出處則知汞之所產旣知鉛與汞則知神水華池旣知神水華池則可以煉金丹金丹之功成於片時不可執九載三年之日程不可泥年月日時而運用錘離所謂四大一身皆屬陰也如是則不可就身中而求特可尋身中一點陽精可也然此陽精在乎一竅常人不可得而猜度也只此一竅則是玄北之門正所謂神水華池也知此則可以採取然後交結其次烹煉至於沐浴以及分胎更須温養丹成可不辯川源知斤兩識時日者耶泰自從得師訣以來知此身不可死知此丹必可成今旣大事入手以此詔諸未來學仙者云}
